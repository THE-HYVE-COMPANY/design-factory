<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 600" width="1200" height="600">
  <defs>
    <style>
      .label{font-family:-apple-system,Inter,sans-serif;font-size:16px;fill:#f6f7fb;font-weight:500}
      .sub{font-family:-apple-system,Inter,sans-serif;font-size:13px;fill:#9aa1ad}
      .layer{fill:#161821;stroke:#2a2d36;stroke-width:1;rx:14}
      .layer-accent{fill:#d88a6b;opacity:0.08}
      .arrow{stroke:#9aa1ad;stroke-width:1.5;fill:none}
      .accent{fill:#d88a6b}
    </style>
  </defs>
  <rect width="1200" height="600" fill="#0e0f12"/>

  <!-- Layer 1: Browser -->
  <g transform="translate(80,80)">
    <rect class="layer" width="1040" height="120"/>
    <rect class="layer layer-accent" width="1040" height="120"/>
    <text class="label" x="20" y="34">Browser  ·  http://localhost:1420</text>
    <text class="sub" x="20" y="58">React + Vite + TypeScript</text>
    <g transform="translate(20,75)">
      <text class="sub" x="0" y="14">Chat thread</text>
      <text class="sub" x="140" y="14">·  Live iframe</text>
      <text class="sub" x="270" y="14">·  Tweaks panel</text>
      <text class="sub" x="430" y="14">·  Video tab</text>
      <text class="sub" x="555" y="14">·  Settings</text>
      <text class="sub" x="660" y="14">·  Slash menu</text>
      <text class="sub" x="785" y="14">·  Terminal</text>
    </g>
  </g>

  <!-- Arrow -->
  <line class="arrow" x1="600" y1="220" x2="600" y2="270" marker-end="url(#a)"/>

  <!-- Layer 2: Daemon -->
  <g transform="translate(80,280)">
    <rect class="layer" width="1040" height="120"/>
    <text class="label" x="20" y="34">Node daemon  ·  http://localhost:1421</text>
    <text class="sub" x="20" y="58">@df/daemon  ·  ~30 HTTP endpoints  ·  WebSocket /terminal</text>
    <g transform="translate(20,75)">
      <text class="sub" x="0" y="14">/{provider}/stream</text>
      <text class="sub" x="180" y="14">·  /fs/*</text>
      <text class="sub" x="260" y="14">·  /config/{provider}</text>
      <text class="sub" x="430" y="14">·  /skills</text>
      <text class="sub" x="510" y="14">·  /gh/device/*</text>
      <text class="sub" x="630" y="14">·  /deploy/vercel</text>
      <text class="sub" x="775" y="14">·  /hyperframes/render</text>
    </g>
  </g>

  <!-- Arrow -->
  <line class="arrow" x1="600" y1="420" x2="600" y2="470" marker-end="url(#a)"/>

  <!-- Layer 3: Local CLIs / APIs -->
  <g transform="translate(80,480)">
    <rect class="layer" width="1040" height="80"/>
    <text class="label" x="20" y="34">Local CLIs  +  APIs (you choose)</text>
    <g transform="translate(20,55)">
      <text class="sub accent" x="0" y="14" fill="#d88a6b">Claude</text>
      <text class="sub" x="60" y="14">·  Codex  ·  Gemini  ·  Anthropic API (BYOK)  ·  Vercel  ·  Hyperframes (Puppeteer + FFmpeg)</text>
    </g>
  </g>

  <defs>
    <marker id="a" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto">
      <path d="M0,0 L10,5 L0,10 Z" fill="#9aa1ad"/>
    </marker>
  </defs>
</svg>