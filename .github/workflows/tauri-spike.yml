# SPIKE workflow — builds Tauri installers (Windows + macOS) on free public-repo
# runners so the founder can download + click to test (the WebView render + CLI
# detection only answer on real hardware). Spike branch only — NOT for main.
name: tauri-spike

on:
  workflow_dispatch: {}

permissions:
  contents: write   # tauri-action publishes the installer as a Release

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        os: [windows-latest, macos-latest]   # macos-latest = Apple Silicon (arm64)
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with: { node-version: 20 }

      - uses: oven-sh/setup-bun@v2          # daemon → single-binary sidecar

      - uses: dtolnay/rust-toolchain@stable # Tauri needs Rust

      - run: npm ci                         # installs workspaces incl. @df/daemon

      # Generate the app icons from the DF logo into src-tauri/icons/.
      # Tauri v2's icon command rasterizes SVG via resvg. If this step fails on
      # SVG input, fallback: rasterize to a 1024px PNG first, then pass the PNG.
      - run: npx --yes @tauri-apps/cli@^2 icon src/assets/logo-df.svg

      # tauri-action runs the beforeBuildCommand (npm run build +
      # scripts/build-daemon-bin.mjs), builds the app, and uploads the .msi/.exe
      # to a GitHub Release for an easy download link.
      - uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tagName: spike-test
          releaseName: "Design Factory — Tauri spike (TEST, unsigned)"
          releaseBody: "Throwaway test build (unsigned). Windows: More info → Run anyway. macOS: right-click → Open (or Settings → Privacy → Open Anyway)."
          releaseDraft: false
          prerelease: true
